backend:
  name: github
  repo: JettN/Projects-Portal
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "showcase"
    label: "Showcase Page"
    files:
      - file: "content/showcase/showcase.md"
        label: "Project Showcase"
        name: "showcase"
        fields:
          - { label: "Showcase Description", name: "body", widget: "markdown" }
          - { label: "Winning Project Title", name: "winner_title", widget: "string" }
          - { label: "Winning Project Image", name: "winner_image", widget: "image" }
          - { label: "Winning Project Description", name: "winner_description", widget: "text" }

  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    path: "{{slug}}/index"
    fields:
      - { label: "Project Title", name: "title", widget: "string" }
      - { label: "Detailed Description", name: "body", widget: "markdown" }
      - label: "Team Members"
        name: "team"
        widget: "list"
      - label: "Project Start Date"
        name: "start_date"
        widget: "datetime"
      - label: "Project End Date"
        name: "end_date"
        widget: "datetime"
        required: false
      - label: "Visibility"
        name: "visibility"
        widget: "select"
        options: ["Public", "Internal"]
      - label: "Project Type"
        name: "type"
        widget: "select"
        options: ["Computer Science", "Data Science", "Electrical", "Mechanical", "Other"]
      - label: "Preview Image"
        name: "preview_image"
        widget: "image"
      - label: "Project Gallery"
        name: "gallery"
        widget: "list"
        field: { label: "Image", name: "image", widget: "image" }
      - label: "Demo Video"
        name: "demo_video"
        widget: "file"
        required: false
      - label: "Documentation PDF"
        name: "documentation"
        widget: "file"
        required: false
      - label: "GitHub Repo"
        name: "github"
        widget: "string"
        required: false
      - label: "Technologies"
        name: "technologies"
        widget: "list"
        required: false
      - label: "External Links"
        name: "links"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }